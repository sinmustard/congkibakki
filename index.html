<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>청기백기 게임</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <link href="https://fonts.googleapis.com/css2?family=Jua&family=Do+Hyeon&display=swap" rel="stylesheet">
  <style>
    body { font-family: 'Jua', 'Do Hyeon', sans-serif; }
    @keyframes flash { 0%, 100% { opacity: 1; } 50% { opacity: 0.5; } }
    .flash-effect { animation: flash 0.5s ease-in-out infinite; }
  </style>
</head>
<body class="bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500" id="bodyBg">

  <div class="max-w-4xl w-full bg-white rounded-3xl shadow-2xl p-6 text-center border-4 border-indigo-200">
    
    <!-- 타이틀 (클릭 시 익스트림 모드 토글) -->
    <h1 class="text-4xl font-extrabold text-indigo-600 mb-2 cursor-pointer select-none hover:scale-105 transition-transform" id="gameTitle" onclick="toggleMode()">
      🔵 청기백기 🔴
    </h1>
    <p class="text-gray-500 text-sm mb-6" id="gameSubtitle">지시에 맞게 버튼을 눌러보세요!</p>

    <!-- 게임 플레이 화면 (스포일러 구역 표시 완전 삭제) -->
    <div class="bg-amber-100 rounded-2xl p-6 h-64 flex justify-between items-center relative overflow-hidden border-2 border-amber-200 mb-6" id="gameDisplay">
      
      <!-- [왼쪽 영역] 캐릭터와 북 오브젝트만 배치 (텍스트 및 노란 점선 제거) -->
      <div class="flex flex-col items-center relative z-10">
        <div id="blueFlagVisual" class="transition-all duration-300 transform scale-125 origin-bottom" style="opacity: 0.8;">
          <div class="text-6xl">🔹</div> <!-- 파란 캐릭터 캐릭터 대용 -->
        </div>
        <div class="text-4xl mt-2">🥁</div> <!-- 북 오브젝트 -->
      </div>

      <!-- [중앙 영역] 지시어 및 타이머 -->
      <div class="flex flex-col items-center justify-center flex-1 mx-4 z-20">
        <h2 class="text-3xl font-bold text-gray-800 mb-4 drop-shadow-sm h-16 flex items-center" id="instruction">
          "시작 버튼을 눌러주세요!"
        </h2>
        <!-- 타이머 바 -->
        <div class="w-full bg-gray-300 h-3 rounded-full overflow-hidden shadow-inner max-w-xs">
          <div class="h-full bg-indigo-600 transition-all duration-100" id="timerBar" style="width: 100%;"></div>
        </div>
      </div>

      <!-- [오른쪽 영역] 캐릭터와 징 오브젝트만 배치 (텍스트 및 흰 점선 제거) -->
      <div class="flex flex-col items-center relative z-10">
        <div id="redFlagVisual" class="transition-all duration-300 transform scale-125 origin-bottom" style="opacity: 0.8;">
          <div class="text-6xl">🔸</div> <!-- 흰색/붉은 캐릭터 대용 -->
        </div>
        <div class="text-4xl mt-2">🔔</div> <!-- 징 오브젝트 -->
      </div>

    </div>

    <!-- 컨트롤러 영역 (게임 시작 전에는 hidden 상태로 완벽 차단) -->
    <div id="startArea" class="block">
      <button onclick="startGame()" class="w-full max-w-md bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-4 rounded-2xl text-xl shadow-lg transform active:scale-95 transition-all mx-auto">
        🎮 게임 시작
      </button>
    </div>

    <div id="controlArea" class="hidden grid grid-cols-2 gap-4 max-w-md mx-auto">
      <button onclick="handleInput('drum')" class="bg-indigo-600 hover:bg-indigo-700 text-white font-bold py-5 rounded-2xl shadow-lg text-lg active:scale-95 transition-all">🥁 북 치기</button>
      <button onclick="handleInput('gong')" class="bg-amber-600 hover:bg-amber-700 text-white font-bold py-5 rounded-2xl shadow-lg text-lg active:scale-95 transition-all">🔔 징 치기</button>
    </div>

    <!-- 단일 명예의 전당 랭킹판 (구분선 없는 일체형 구조) -->
    <div class="mt-8 border-t pt-6 text-left max-w-md mx-auto">
      <div class="flex justify-between items-center mb-4">
        <h3 class="text-lg font-bold text-gray-700" id="rankingBoardTitle">🏆 실시간 명예의 전당 (TOP 5)</h3>
        <button onclick="fetchRankings()" class="text-xs text-gray-400 hover:text-indigo-500">🔄 새로고침</button>
      </div>
      <div class="bg-gray-50 rounded-2xl p-4 min-h-[150px]" id="rankingList">
        <p class="text-xs text-gray-400 text-center py-8">데이터를 불러오는 중...</p>
      </div>
    </div>

  </div>

  <script>
    const SUPABASE_URL = "https://gqomvmlpsivzllzllayx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdxb212bWxwc2l2emxsemxsYXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAxNTc4NjYsImV4cCI6MjA1NTczMzg2Nn0.f9XJ1H7w4_e-0O76Bw0h76Y2wD9V2H31x0l_Fqf1L0A";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let score = 0;
    let isPlaying = false;
    let isExtremeMode = false;
    let timer = null;
    let timeLeft = 100;
    let currentTarget = ""; 

    const normalCommands = [
      { text: "🔊 북을 쳐라!", target: "drum" },
      { text: "🔊 징을 울려라!", target: "gong" }
    ];
    const extremeCommands = [
      { text: "🔥 북을 치지 말고... 징을 쳐라!", target: "gong" },
      { text: "🔥 징을 치지 말고... 북을 쳐라!", target: "drum" },
      { text: "🔥 삐빅- 북을 치십시오!", target: "drum" }
    ];

    fetchRankings();

    function toggleMode() {
      if (isPlaying) return;
      isExtremeMode = !isExtremeMode;

      if (isExtremeMode) {
        document.getElementById('bodyBg').className = "bg-gradient-to-br from-red-950 to-gray-900 min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500";
        document.getElementById('gameTitle').className = "text-4xl font-extrabold text-red-500 mb-2 cursor-pointer select-none flash-effect";
        document.getElementById('gameSubtitle').innerText = "🔥 15년 차 개발자 전용 히든 모드 활성화 🔥";
      } else {
        document.getElementById('bodyBg').className = "bg-gradient-to-br from-blue-50 to-indigo-100 min-h-screen flex flex-col items-center justify-center p-4 transition-all duration-500";
        document.getElementById('gameTitle').className = "text-4xl font-extrabold text-indigo-600 mb-2 cursor-pointer select-none";
        document.getElementById('gameSubtitle').innerText = "지시에 맞게 버튼을 눌러보세요!";
      }
      fetchRankings();
    }

    function startGame() {
      isPlaying = true;
      score = 0;
      document.getElementById('startArea').classList.add('hidden');
      document.getElementById('controlArea').classList.remove('hidden');
      nextRound();
    }

    function nextRound() {
      if (!isPlaying) return;
      
      const pool = isExtremeMode ? [...normalCommands, ...extremeCommands] : normalCommands;
      const cmd = pool[Math.floor(Math.random() * pool.length)];
      
      document.getElementById('instruction').innerText = cmd.text;
      currentTarget = cmd.target;

      clearInterval(timer);
      timeLeft = 100;
      let limit = Math.max(600, 2500 - (score * 150));

      timer = setInterval(() => {
        timeLeft -= 2;
        document.getElementById('timerBar').style.width = timeLeft + "%";
        if (timeLeft <= 0) {
          clearInterval(timer);
          gameOver("⏰ 시간 초과!");
        }
      }, limit / 50);
    }

    function handleInput(type) {
      if (!isPlaying) return;

      if (type === currentTarget) {
        score++;
        // 성공 시 살짝 팅기는 애니메이션 효과
        const visualId = type === 'drum' ? 'blueFlagVisual' : 'redFlagVisual';
        document.getElementById(visualId).classList.add('scale-150');
        setTimeout(() => document.getElementById(visualId).classList.remove('scale-150'), 100);
        
        nextRound();
      } else {
        gameOver("❌ 틀린 박자!");
      }
    }

    function gameOver(reason) {
      isPlaying = false;
      clearInterval(timer);
      document.getElementById('instruction').innerText = `💀 게임 오버 (${score}점)\n${reason}`;
      document.getElementById('startArea').classList.remove('hidden');
      document.getElementById('controlArea').classList.add('hidden');
      
      // 즉시 닉네임 입력 받아 Supabase 등록창 띄우기 가능
      const name = prompt(`🎉 ${score}점 달성! 명예의 전당 닉네임을 입력하세요 (최대 5자):`);
      if (name) submitScore(name);
    }

    async function submitScore(name) {
      const table = isExtremeMode ? 'rankings_extreme' : 'rankings';
      await _supabase.from(table).insert([{ name: name.slice(0,5), score: score }]);
      fetchRankings();
    }

    async function fetchRankings() {
      const table = isExtremeMode ? 'rankings_extreme' : 'rankings';
      const listDiv = document.getElementById('rankingList');
      
      try {
        const { data } = await _supabase.from(table).select('*').order('score', { ascending: false }).limit(5);
        if (!data || data.length === 0) {
          listDiv.innerHTML = `<p class="text-xs text-gray-400 text-center py-8">아직 등록된 기록이 없습니다.</p>`;
          return;
        }
        listDiv.innerHTML = data.map((r, i) => `
          <div class="flex justify-between items-center px-4 py-2 rounded-xl mb-1 bg-white border text-sm font-medium shadow-sm">
            <span>${i+1}등. ${r.name}</span>
            <span class="font-bold ${isExtremeMode ? 'text-red-500' : 'text-indigo-600'}">${r.score}회</span>
          </div>
        `).join('');
      } catch(e) {
        listDiv.innerHTML = `<p class="text-xs text-red-400 text-center py-8">데이터 로드 실패</p>`;
      }
    }
  </script>
</body>
</html>
