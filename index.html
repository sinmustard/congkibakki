<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <title>청기백기 게임</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
</head>
<body class="bg-gray-100 flex flex-col items-center justify-center min-h-screen">

  <div class="max-w-md w-full bg-white p-8 rounded-xl shadow-lg">
    <!-- 게임 타이틀 (클릭 시 익스트림 전환) -->
    <h1 id="gameTitle" onclick="toggleMode()" class="text-3xl font-bold text-center mb-6 cursor-pointer select-none">
      청기백기 게임
    </h1>

    <!-- 게임 화면 (여기에 북/징 상태가 나옴) -->
    <div id="gameDisplay" class="h-40 bg-gray-200 mb-6 flex items-center justify-center rounded">
      <p id="instruction">시작 버튼을 눌러주세요</p>
    </div>

    <!-- 시작 버튼 -->
    <button id="startArea" onclick="startGame()" class="w-full bg-blue-500 text-white py-3 rounded">게임 시작</button>

    <!-- 북/징 컨트롤 영역 (평소에는 hidden) -->
    <div id="controlArea" class="hidden grid grid-cols-2 gap-4">
      <button onclick="handleInput('drum', 'hit')" class="bg-indigo-600 text-white py-4 rounded">북 치기</button>
      <button onclick="handleInput('gong', 'hit')" class="bg-yellow-600 text-white py-4 rounded">징 치기</button>
    </div>

    <!-- 랭킹 영역 (구분선 없음) -->
    <div class="mt-8">
      <h2 class="font-bold mb-2">명예의 전당</h2>
      <div id="rankingList" class="text-sm">데이터 로딩 중...</div>
    </div>
  </div>

  <script>
    const SUPABASE_URL = "https://gqomvmlpsivzllzllayx.supabase.co";
    const SUPABASE_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Imdxb212bWxwc2l2emxsemxsYXl4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDAxNTc4NjYsImV4cCI6MjA1NTczMzg2Nn0.f9XJ1H7w4_e-0O76Bw0h76Y2wD9V2H31x0l_Fqf1L0A";
    const _supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

    let isExtreme = false;

    // 모드 전환 함수
    function toggleMode() {
      isExtreme = !isExtreme;
      document.getElementById('gameTitle').innerText = isExtreme ? "🚨 익스트림 모드 🚨" : "청기백기 게임";
      document.body.className = isExtreme ? "bg-red-900" : "bg-gray-100";
      fetchRankings();
    }

    // 게임 시작 (컨트롤 영역 노출)
    function startGame() {
      document.getElementById('startArea').classList.add('hidden');
      document.getElementById('controlArea').classList.remove('hidden');
      // 여기에 실제 게임 로직 시작 코드 추가
    }

    // 게임 종료 (컨트롤 영역 숨김)
    function gameOver() {
      document.getElementById('startArea').classList.remove('hidden');
      document.getElementById('controlArea').classList.add('hidden');
    }

    async function fetchRankings() {
      const table = isExtreme ? 'rankings_extreme' : 'rankings';
      const { data } = await _supabase.from(table).select('*').order('score', { ascending: false }).limit(5);
      document.getElementById('rankingList').innerHTML = data ? data.map(r => `<div>${r.name}: ${r.score}</div>`).join('') : "없음";
    }

    fetchRankings();
  </script>
</body>
</html>
